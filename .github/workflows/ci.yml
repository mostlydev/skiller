name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Check diff whitespace
        run: git diff --check

      - name: Install shellcheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi

      - name: Shellcheck installer
        run: shellcheck scripts/install.sh

      - name: Static build
        run: CGO_ENABLED=0 go build -o "$RUNNER_TEMP/skiller" ./cmd/skiller

      - name: M4 gate smoke
        run: |
          "$RUNNER_TEMP/skiller" --version
          "$RUNNER_TEMP/skiller" version --json
          "$RUNNER_TEMP/skiller" registry --json >/tmp/skiller-registry.json
          "$RUNNER_TEMP/skiller" plan \
            --manifest testdata/m0/manifests/talking-stick.toml \
            --home "$RUNNER_TEMP/skiller-home" \
            --json >/tmp/skiller-plan.json
