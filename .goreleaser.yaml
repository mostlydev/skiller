# Requires a recent GoReleaser v2 with the modern `archives.ids` / `archives.formats` /
# `format_overrides.formats` fields (NOT present in v2.4.x). Validated with v2.16; the
# release workflow pins `~> v2.16`.
version: 2

project_name: skiller

gomod:
  # Build from the local source tree, not a proxy-downloaded module copy. proxy:true
  # requires the tag to be fetchable via proxy.golang.org, which fails for a private
  # repo and is flaky on a freshly pushed tag. Revisit once skiller is a published,
  # go-gettable module and we want verifiable proxy builds.
  proxy: false

builds:
  - id: skiller
    main: ./cmd/skiller
    binary: skiller
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    tags:
      - osusergo
      - netgo
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - >-
        -s -w
        -X github.com/mostlydev/skiller/pkg/version.Version={{ .Version }}
        -X github.com/mostlydev/skiller/pkg/version.Commit={{ .Commit }}
        -X github.com/mostlydev/skiller/pkg/version.Date={{ .Date }}
        -X github.com/mostlydev/skiller/pkg/version.BuiltBy=goreleaser

archives:
  - id: skiller
    ids:
      - skiller
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - docs/releases/*.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
